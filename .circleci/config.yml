version: 2.1

parameters:
  scheduled_pipeline:
    type: boolean
    default: false

orbs:
  node: circleci/node@5.0.2

workflows:
  chromatic:
    when: << pipeline.parameters.scheduled_pipeline >>
    jobs:
      - chromatic
  my-workflow:
    when:
      not: << pipeline.parameters.scheduled_pipeline >>
    jobs:
      - hello-job

jobs:
  chromatic:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - restore_cache:
          name: Restore pnpm Package Cache
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install pnpm package manager
          command: |
            sudo corepack enable
            sudo corepack prepare pnpm@latest-9 --activate
            pnpm config set store-dir .pnpm-store
          environment:
            TURBO_UI: 'false'
      - run:
          name: Install Dependencies
          command: |
            pnpm install
          environment:
            TURBO_UI: 'false'
      - run:
          command: pnpm build-storybook --filter=ui
          environment:
            TURBO_UI: 'false'
      - save_cache:
          name: Save pnpm Package Cache
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store
      - run:
          command: pnpm chromatic --filter=ui
  hello-job:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run: echo "hello world"
